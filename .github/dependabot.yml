version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/backend"
    schedule:
      interval: "weekly"
    ignore:
      - dependency-name: "prisma"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "@prisma/client"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
